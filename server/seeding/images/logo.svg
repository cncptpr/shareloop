<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#2a2320"/>
  
  <!-- Left curved line -->
  <path d="M 100 150 Q 100 280 180 350" 
        stroke="#e8c86d" stroke-width="28" fill="none" stroke-linecap="round"/>
  
  <!-- Right curved line -->
  <path d="M 412 160 Q 412 280 330 350" 
        stroke="#e8c86d" stroke-width="28" fill="none" stroke-linecap="round"/>
  
  <!-- Top right arrow -->
  <g transform="translate(410, 90)">
    <polygon points="0,0 30,-8 20,-28 50,-12 30,8" fill="#e8c86d"/>
  </g>
  
  <!-- Bottom left arrow -->
  <g transform="translate(100, 370)">
    <polygon points="0,0 -30,8 -20,28 -50,12 -30,-8" fill="#e8c86d"/>
  </g>
  
  <!-- Tent -->
  <g transform="translate(256, 240)">
    <!-- Tent outline -->
    <path d="M -45 30 L 0 -50 L 45 30 Z" 
          stroke="#e8c86d" stroke-width="20" fill="none" stroke-linejoin="round"/>
    
    <!-- Door lines -->
    <line x1="-20" y1="-10" x2="-20" y2="30" stroke="#e8c86d" stroke-width="18" stroke-linecap="round"/>
    <line x1="20" y1="-10" x2="20" y2="30" stroke="#e8c86d" stroke-width="18" stroke-linecap="round"/>
    
    <!-- Door opening triangle -->
    <path d="M -20 30 L 0 5 L 20 30" 
          fill="#2a2320" stroke="none"/>
  </g>
</svg>

