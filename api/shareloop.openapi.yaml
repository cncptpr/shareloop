openapi: "3.0.3"
info:
  title: Shareloop API
  version: "1.0.0"
  description: API for the Shareloop application

servers:
  - url: /api

paths:
  /featured-items:
    post:
      summary: Get featured items
      description: Returns a list of featured items
      operationId: getFeaturedItems
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LatLng"
      responses:
        "200":
          description: A list of featured items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeaturedItem"

  /items:
    post:
      summary: Create a new item
      description: Creates a new item listing
      operationId: createItem
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
      responses:
        "201":
          description: Item created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateItemResponse"

  /items/{itemId}/images:
    post:
      summary: Upload an image for an item
      operationId: uploadItemImage
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadItemImageRequest"
      responses:
        "201":
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadItemImageResponse"

  /images/{imageId}:
    get:
      summary: Get raw image data
      operationId: getImage
      parameters:
        - name: imageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Raw image bytes
          content:
            application/json:
              schema:
                type: string

  /auth/login:
    post:
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid credentials

  /auth/refresh:
    post:
      summary: Refresh tokens
      operationId: refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid or expired refresh token

  /auth/verify:
    post:
      summary: Verify access token
      operationId: verify
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Invalid or expired token

  /auth/logout:
    post:
      summary: Logout
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Logged out
        "401":
          description: Invalid token

components:
  schemas:
    FeaturedItem:
      type: object
      required: [title, description, author, score]
      properties:
        title:
          type: string
        description:
          type: string
        author:
          $ref: "#/components/schemas/Person"
        distance:
          $ref: "#/components/schemas/Distance"
          nullable: true
        city:
          type: string
        postalCode:
          type: string
        score:
          type: number
          format: double
        imageUuid:
          type: string
          nullable: true

    Person:
      type: object
      required: [name]
      properties:
        name:
          type: string

    Distance:
      type: object
      required: [km]
      properties:
        km:
          type: number
          format: double

    LatLng:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    User:
      type: object
      required: [id, email, lastOnlineAt, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        lastOnlineAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    LoginResult:
      type: object
      required: [user, accessToken, refreshToken, accessExpiresAt, refreshExpiresAt]
      properties:
        user:
          $ref: "#/components/schemas/User"
        accessToken:
          type: string
        refreshToken:
          type: string
        accessExpiresAt:
          type: string
          format: date-time
        refreshExpiresAt:
          type: string
          format: date-time

    CreateItemRequest:
      type: object
      required: [title, description, city, postalCode, lat, lng]
      properties:
        title:
          type: string
        description:
          type: string
        city:
          type: string
        postalCode:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double

    CreateItemResponse:
      type: object
      required: [id]
      properties:
        id:
          type: integer

    UploadItemImageRequest:
      type: object
      required: [data, filename, sortOrder]
      properties:
        data:
          type: string
          description: Base64-encoded image data
        filename:
          type: string
          description: Original filename for extension detection
        sortOrder:
          type: integer
          description: Position of this image in the item's image list

    UploadItemImageResponse:
      type: object
      required: [uuid]
      properties:
        uuid:
          type: string
          format: uuid

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
