rent_requests:
  # req_a: Dev -> Luca (Zelt) — OFFEN, 1 Angebot
  - id: req_a
    item: ref(item_zelt)
    requester: ref(user_dev)
    messages:
      - author: ref(user_dev)
        content: Hey Luca, ist das Zelt noch frei fürs Wochenende 12.–14. Juli? Will mit meiner Freundin an den Bäff see.
        created_at: "-5d 18:30"
      - author: ref(user_luca)
        content: "Klar, 4 Personen oder nur zu zweit? Das Wurfzelt ist ja geräumig."
        created_at: "-5d 19:00"
      - author: ref(user_dev)
        content: "Nur zu zweit, aber das Wurfzelt ist perfekt – schnell aufgebaut und viel Platz."
        created_at: "-5d 19:15"
      - author: ref(user_luca)
        content: "Stimmt. Samstag bis Sonntag reicht dir, oder schon Freitag?"
        created_at: "-5d 19:30"
      - author: ref(user_dev)
        content: "Von Samstag 10 Uhr bis Sonntag 18 Uhr wär ideal."
        created_at: "-5d 19:45"
      - author: ref(user_luca)
        content: "Passt! Ich schick dir ein Angebot rüber."
        created_at: "-5d 20:00"
    offers:
      - sender: ref(user_luca)
        start_date: "+2d"
        end_date: "+4d"
        accepted: false
        created_at: "-5d 20:05"
    read_at: "-5d 20:30"
    mark_read:
      - ref(user_dev)
      - ref(user_luca)

  # req_b: Dev -> Lisa (Auto) — ABGESCHLOSSEN (zurück)
  - id: req_b
    item: ref(item_auto)
    requester: ref(user_dev)
    borrow_confirmed: true
    returned: true
    messages:
      - author: ref(user_dev)
        content: "Moin Lisa, kann ich den Golf am 1. Juli für den Umzug leihen? Brauch ihn nur für den Vormittag."
        created_at: "-12d 08:00"
      - author: ref(user_lisa)
        content: "Klar! Ein Tag sollte reichen? Hab ihn eh ab 8 Uhr frei."
        created_at: "-12d 08:30"
      - author: ref(user_dev)
        content: "Ja, ein Tag ist perfekt. Bis 20 Uhr geb ich ihn zurück, vollgetankt."
        created_at: "-12d 09:00"
      - author: ref(user_lisa)
        content: "Super, denk an die Zulassungsbescheinigung – liegt im Handschuhfach. Viel Erfolg beim Umzug!"
        created_at: "-12d 09:15"
      - author: ref(user_dev)
        content: "Danke, hat alles geklappt! Auto steht sauber und vollgetankt bei dir. Schlüssel im Briefkasten."
        created_at: "-11d 20:00"
      - author: ref(user_lisa)
        content: "Perfekt, alles in Ordnung! Gern wieder :)"
        created_at: "-11d 20:30"
    offers:
      - sender: ref(user_lisa)
        start_date: "-12d"
        end_date: "-11d"
        accepted: true
        created_at: "-12d 09:15"
        accepted_at: "-12d 09:15"
    borrow_confirmed_at: "-12d 10:00"
    returned_at: "-11d 20:00"
    read_at: "-11d 21:00"
    mark_read:
      - ref(user_dev)
      - ref(user_lisa)

  # req_c: Lisa -> Timon (Ski) — OFFEN, 2 Angebote
  - id: req_c
