openapi: "3.0.3"
info:
  title: Shareloop API
  version: "1.0.0"
  description: API for the Shareloop application

servers:
  - url: /api

paths:
  /featured-items:
    post:
      summary: Get featured items
      description: Returns a list of featured items
      operationId: getFeaturedItems
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LatLng"
      responses:
        "200":
          description: A list of featured items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemOverview"
        "500":
          description: Internal server error

  /items/search:
    post:
      summary: Search items
      description: Search items with filters
      operationId: searchItems
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemSearchRequest"
      responses:
        "200":
          description: A list of matching items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemOverview"
        "500":
          description: Internal server error

  /items:
    post:
      summary: Create a new item
      description: Creates a new item listing
      operationId: createItem
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
      responses:
        "201":
          description: Item created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateItemResponse"
        "401":
          description: Unauthorized
        "500":
          description: Internal server error

  /items/{itemId}:
    get:
      summary: Get item details
      description: Returns full details for a single item
      operationId: getItem
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemDetail"
        "404":
          description: Item not found
        "500":
          description: Internal server error
    put:
      summary: Update an item
      operationId: updateItem
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItemRequest"
      responses:
        "200":
          description: Item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateItemResponse"
        "401":
          description: Unauthorized
        "403":
          description: Not the owner
        "404":
          description: Item not found
        "500":
          description: Internal server error
    delete:
      summary: Delete an item
      description: Delete an item listing. Only the owner can delete. Fails with 409 if the item has active rent requests.
      operationId: deleteItem
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Item deleted
        "401":
          description: Unauthorized
        "403":
          description: Not the owner
        "404":
          description: Item not found
        "409":
          description: Item has active rent requests
        "500":
          description: Internal server error

  /items/{itemId}/rent-requests:
    post:
      summary: Create or get existing open rent request
      operationId: createRentRequest
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Rent request created or existing one returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentRequestDetail"
        "401":
          description: Unauthorized
        "500":
          description: Internal server error

  /rent-requests:
    get:
      summary: List rent requests for current user
      operationId: getRentRequests
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of rent requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RentRequestOverview"
        "401":
          description: Unauthorized
        "500":
          description: Internal server error

  /rent-requests/{requestId}:
    get:
      summary: Get a single rent request with messages and offers
      operationId: getRentRequest
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rent request details with messages and offers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentRequestDetail"
        "401":
          description: Unauthorized
        "404":
          description: Not found
        "500":
          description: Internal server error

  /rent-requests/{requestId}/mark-read:
    post:
      summary: Mark a rent request as read
      operationId: markRentRequestRead
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Marked as read
        "401":
          description: Unauthorized
        "404":
          description: Not found
        "500":
          description: Internal server error

  /rent-requests/{requestId}/messages:
    post:
      summary: Send a message in a rent request chat
      operationId: sendMessage
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          description: Unauthorized
        "404":
          description: Not found
        "500":
          description: Internal server error

  /rent-requests/{requestId}/offers:
    post:
      summary: Make or counter an offer
      operationId: createOffer
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOfferRequest"
      responses:
        "201":
          description: Offer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentOffer"
        "401":
          description: Unauthorized
        "404":
          description: Not found
        "500":
          description: Internal server error

  /offers/{offerId}/accept:
    post:
      summary: Accept an offer
      operationId: acceptOffer
      security:
        - bearerAuth: []
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Offer accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentOffer"
        "401":
          description: Unauthorized
        "403":
          description: Not authorized
        "404":
          description: Offer not found
        "500":
          description: Internal server error

  /rent-requests/{requestId}/confirm-borrow:
    post:
      summary: Confirm that borrowing happened
      operationId: confirmBorrow
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Borrow confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentRequestDetail"
        "401":
          description: Unauthorized
        "403":
          description: Not the owner
        "404":
          description: Not found
        "500":
          description: Internal server error

  /rent-requests/{requestId}/confirm-return:
    post:
      summary: Confirm item was returned
      operationId: confirmReturn
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Return confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentRequestDetail"
        "401":
          description: Unauthorized
        "403":
          description: Not the owner
        "404":
          description: Not found
        "500":
          description: Internal server error

  /rent-requests/{requestId}/user-rating:
    post:
      summary: Rate the other participant after return
      operationId: submitUserRating
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitUserRatingRequest"
      responses:
        "201":
          description: Rating submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRating"
        "400":
          description: Invalid rating or request is not returned yet
        "401":
          description: Unauthorized
        "403":
          description: Not a participant
        "409":
          description: Current user already rated this rent request
        "500":
          description: Internal server error

  /rent-requests/{requestId}/item-rating:
    post:
      summary: Rate the borrowed item after return
      operationId: submitItemRating
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitItemRatingRequest"
      responses:
        "201":
          description: Item rating submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemRating"
        "400":
          description: Invalid rating or request is not returned yet
        "401":
          description: Unauthorized
        "403":
          description: Only the borrower can rate the item
        "404":
          description: Rent request not found
        "409":
          description: Current user already rated this item for the rent request
        "500":
          description: Internal server error

  /items/{itemId}/booked-dates:
    get:
      summary: Get booked date ranges for an item
      operationId: getBookedDates
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of booked date ranges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DateRange"
        "404":
          description: Item not found
        "500":
          description: Internal server error

  /items/{itemId}/edit:
    get:
      summary: Get item edit details (owner only)
      description: Returns full item details including location for the item owner
      operationId: getItemEdit
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item edit details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemEditDetail"
        "401":
          description: Unauthorized
        "403":
          description: Not the owner
        "404":
          description: Item not found
        "500":
          description: Internal server error

  /items/{itemId}/images:
    post:
      summary: Upload an image for an item
      operationId: uploadItemImage
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadItemImageRequest"
      responses:
        "201":
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadItemImageResponse"
        "401":
          description: Unauthorized
        "403":
          description: Not the owner
        "404":
          description: Item not found
        "500":
          description: Internal server error
    put:
      summary: Edit item images (reorder / delete)
      operationId: editItemImages
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditItemImagesRequest"
      responses:
        "204":
          description: Images updated
        "401":
          description: Unauthorized
        "403":
          description: Not the owner
        "404":
          description: Item not found
        "500":
          description: Internal server error

  /images/{imageId}:
    get:
      summary: Get raw image data
      operationId: getImage
      parameters:
        - name: imageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Raw image bytes
          content:
            application/json:
              schema:
                type: string
        "404":
          description: Image not found
        "500":
          description: Internal server error

  /auth/register:
    post:
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful, auto-logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "409":
          description: Email already exists
        "422":
          description: Validation error
        "500":
          description: Internal server error

  /auth/login:
    post:
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid credentials
        "500":
          description: Internal server error

  /auth/refresh:
    post:
      summary: Refresh tokens
      operationId: refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid or expired refresh token
        "500":
          description: Internal server error

  /auth/verify:
    post:
      summary: Verify access token
      operationId: verify
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Invalid or expired token
        "500":
          description: Internal server error

  /info:
    get:
      summary: Get server info
      description: Returns server version, API version, and seeding status
      operationId: getInfo
      responses:
        "200":
          description: Server info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerInfo"
        "500":
          description: Internal server error

  /seed:
    post:
      summary: Seed the database with demo data
      description: |
        Triggers database seeding with demo data from the configured seeding
        directory. This will DELETE all existing data. Returns 400 if seeding
        is disabled (no valid seeding data found). **This is a development
        feature.**
      operationId: seedDatabase
      responses:
        "200":
          description: Seeding completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          description: Seeding is disabled
        "500":
          description: Seeding failed

  /seed/decline:
    post:
      summary: Decline seeding prompt
      description: |
        Records that the user declined the seeding prompt. Sets the seeding
        timestamp without performing the actual seeding. Returns 400 if
        seeding is disabled.
      operationId: declineSeed
      responses:
        "200":
          description: Decline recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          description: Seeding is disabled

  /users/{userId}/profile:
    get:
      summary: Get user profile
      description: Returns public profile information for a user
      operationId: getUserProfile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: User not found
        "500":
          description: Internal server error
    patch:
      summary: Update own profile
      description: Update name and/or bio for the authenticated user's profile
      operationId: updateUserProfile
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserProfileRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
        "403":
          description: Not the same user
        "404":
          description: User not found
        "500":
          description: Internal server error

  /users/{userId}/items:
    get:
      summary: Get user's items
      description: Returns all items belonging to the specified user
      operationId: getUserItems
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of user's items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemOverview"
        "404":
          description: User not found
        "500":
          description: Internal server error

  /users/{userId}/ratings:
    get:
      summary: Get user ratings
      description: Returns all user ratings received by the specified user
      operationId: getUserRatings
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of user ratings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserRatingDetail"
        "404":
          description: User not found
        "500":
          description: Internal server error

  /users/{userId}/avatar:
    post:
      summary: Upload avatar image
      description: Upload a new avatar image for the authenticated user's profile. Replaces any existing avatar.
      operationId: uploadUserAvatar
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadItemImageRequest"
      responses:
        "201":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadItemImageResponse"
        "401":
          description: Unauthorized
        "403":
          description: Not the same user
        "500":
          description: Internal server error
    delete:
      summary: Remove avatar image
      description: Delete the avatar image for the authenticated user's profile
      operationId: deleteUserAvatar
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Avatar removed
        "401":
          description: Unauthorized
        "403":
          description: Not the same user
        "500":
          description: Internal server error

  /users/{userId}/follow:
    post:
      summary: Follow a user
      description: Follow the specified user
      operationId: followUser
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Followed successfully
        "401":
          description: Unauthorized
        "404":
          description: User not found
        "409":
          description: Already following this user
        "500":
          description: Internal server error
    delete:
      summary: Unfollow a user
      description: Unfollow the specified user
      operationId: unfollowUser
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Unfollowed successfully
        "401":
          description: Unauthorized
        "404":
          description: User not found
        "500":
          description: Internal server error

  /auth/logout:
    post:
      summary: Logout
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Logged out
        "401":
          description: Invalid token
        "500":
          description: Internal server error

components:
  schemas:
    ServerInfo:
      type: object
      required: [serverVersion, apiVersion]
      properties:
        serverVersion:
          type: string
          description: Server version (bumped manually)
        apiVersion:
          type: string
          description: API version
        seeding:
          type: string
          nullable: true
          enum: [prompt, enabled]
          description: |
            Seeding status. `null` = disabled (no seed data configured),
            `"prompt"` = seed data available but never seeded,
            `"enabled"` = seeding already performed, available for re-seed.

    ItemOverview:
      type: object
      required: [id, title, description, author, score, category, pricePerDay]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        author:
          $ref: "#/components/schemas/Person"
        distance:
          $ref: "#/components/schemas/Distance"
          nullable: true
        city:
          type: string
        postalCode:
          type: string
        score:
          type: number
          format: double
        imageUuid:
          type: string
          nullable: true
        category:
          type: string
        pricePerDay:
          type: number
          format: double

    Person:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    Distance:
      type: object
      required: [km]
      properties:
        km:
          type: number
          format: double

    LatLng:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double

    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string
          minLength: 1

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    User:
      type: object
      required: [id, email, lastOnlineAt, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        lastOnlineAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    UserProfile:
      type: object
      required: [id, name, createdAt, lastOnlineAt, itemCount, ratingCount]
      properties:
        id:
          type: integer
        name:
          type: string
        bio:
          type: string
          nullable: true
        rating:
          type: number
          format: double
          nullable: true
        createdAt:
          type: string
          format: date-time
        lastOnlineAt:
          type: string
          format: date-time
        itemCount:
          type: integer
        ratingCount:
          type: integer
        shareCount:
          type: integer
          nullable: true
        avatarUuid:
          type: string
          format: uuid
          nullable: true
        followerCount:
          type: integer
        isFollowed:
          type: boolean
          nullable: true

    UserRatingDetail:
      type: object
      required: [id, reviewer, friendliness, punctuality, reliability, createdAt]
      properties:
        id:
          type: integer
        reviewer:
          $ref: "#/components/schemas/Person"
        friendliness:
          type: integer
          minimum: 1
          maximum: 5
        punctuality:
          type: integer
          minimum: 1
          maximum: 5
        reliability:
          type: integer
          minimum: 1
          maximum: 5
        communication:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
        carefulHandling:
